# Publish the release XCFramework to a GitHub Release.
# Debug XCFrameworks are built locally on demand via `./gradlew <module>:spmDevBuild`.
name: KMMBridge-Publish
on:
  workflow_dispatch:

jobs:
  call-publish:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/create_swift_package.yml
